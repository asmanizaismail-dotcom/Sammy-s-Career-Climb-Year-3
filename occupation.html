<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sammy's Career Climb</title>
    <style>
        :root {
            --grass: #7cfc00;
            --sky: #87ceeb;
            --path: #f4a460;
        }
        body {
            font-family: 'Comic Sans MS', cursive, sans-serif;
            background-color: var(--sky);
            margin: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            overflow: hidden;
        }
        #game-container {
            width: 800px;
            height: 600px;
            background: white;
            border: 10px solid #ff69b4;
            border-radius: 20px;
            position: relative;
            margin-top: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
            text-align: center;
        }
        /* UI Elements */
        #hud {
            display: flex;
            justify-content: space-between;
            padding: 20px;
            font-size: 24px;
            font-weight: bold;
        }
        #lives { color: red; }
        #score { color: #2e8b57; }

        /* Game Content */
        .stage { display: none; padding: 20px; }
        .active { display: block; }

        .job-image {
            width: 250px;
            height: 250px;
            border-radius: 15px;
            border: 5px solid #ddd;
            margin-bottom: 20px;
        }

        .btn {
            padding: 15px 30px;
            font-size: 20px;
            cursor: pointer;
            border-radius: 50px;
            border: none;
            margin: 10px;
            transition: transform 0.2s;
        }
        .btn-listen { background: #3498db; color: white; }
        .btn-speak { background: #f1c40f; color: black; }
        .btn:hover { transform: scale(1.1); }

        /* Snail Progress Bar */
        #progress-area {
            position: absolute;
            bottom: 0;
            width: 100%;
            height: 100px;
            background: var(--grass);
            border-top: 5px solid #2e8b57;
        }
        #snail {
            position: absolute;
            left: 0;
            bottom: 20px;
            font-size: 50px;
            transition: left 0.5s ease;
        }

        /* Feedback Popups */
        #feedback {
            font-size: 30px;
            font-weight: bold;
            height: 40px;
            margin: 10px;
        }
    </style>
</head>
<body>

<div id="game-container">
    <div id="hud">
        <div id="score">Score: 0</div>
        <div id="lives">❤️❤️❤️</div>
    </div>

    <div id="feedback"></div>

    <div id="stage1" class="stage active">
        <h2>Stage 1: Listen & Speak</h2>
        <img id="s1-img" class="job-image" src="https://img.icons8.com/color/200/chef.png" alt="Occupation">
        <br>
        <button class="btn btn-listen" onclick="playAudio()">🔊 Listen</button>
        <button id="speak-btn" class="btn btn-speak" onclick="startSpeech()">🎤 Speak</button>
        <p id="instruction">Click Listen, then say the word!</p>
    </div>

    <div id="stage2" class="stage">
        <h2>Stage 2: Read the Sentence</h2>
        <img id="s2-img" class="job-image" src="" alt="Action">
        <h3 id="s2-text">The chef is cooking.</h3>
        <button id="speak-btn-2" class="btn btn-speak" onclick="startSpeech()">🎤 Read Aloud</button>
    </div>

    <div id="stage3" class="stage">
        <h2>Stage 3: Who is it?</h2>
        <img id="s3-img" class="job-image" src="" alt="Logic">
        <p id="s3-question">Does he want to be a doctor?</p>
        <div id="drop-zone" style="border: 2px dashed #333; padding: 20px; margin: 10px;">
            No, he wants to be a [ DRAG HERE ]
        </div>
        <div id="options">
            </div>
    </div>

    <div id="progress-area">
        <div id="snail">🐌</div>
    </div>
</div>

<script>
    // Game State
    let score = 0;
    let lives = 3;
    let currentStage = 1;
    let itemIndex = 0;

    const occupations = [
        { name: 'chef', image: 'https://img.icons8.com/color/200/chef.png', sentence: 'The chef is cooking a dish.' },
        { name: 'firefighter', image: 'https://img.icons8.com/color/200/fireman-male.png', sentence: 'The firefighter is putting out the fire.' },
        { name: 'doctor', image: 'https://img.icons8.com/color/200/doctor-female.png', sentence: 'The doctor is treating a patient.' }
    ];

    // Speech Recognition Setup
    const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
    const recognition = new SpeechRecognition();
    recognition.lang = 'en-US';

    function updateHUD() {
        document.getElementById('score').innerText = `Score: ${score}`;
        document.getElementById('lives').innerText = '❤️'.repeat(lives);
    }

    function showFeedback(text, color) {
        const fb = document.getElementById('feedback');
        fb.innerText = text;
        fb.style.color = color;
        setTimeout(() => fb.innerText = '', 2000);
    }

    function moveSnail() {
        const snail = document.getElementById('snail');
        const pos = (score / 200) * 80; // Simple percentage-based movement
        snail.style.left = pos + "%";
    }

    // Stage Logic
    function playAudio() {
        const msg = new SpeechSynthesisUtterance(occupations[itemIndex].name);
        window.speechSynthesis.speak(msg);
    }

    function startSpeech() {
        recognition.start();
        document.getElementById('feedback').innerText = "Listening...";
    }

    recognition.onresult = (event) => {
        const transcript = event.results[0][0].transcript.toLowerCase();
        const target = occupations[itemIndex].name.toLowerCase();

        if (transcript.includes(target)) {
            score += 10;
            showFeedback("Great Job! ✨", "green");
            nextItem();
        } else {
            lives--;
            showFeedback("Try again! ❌", "red");
            if (lives <= 0) resetLevel();
        }
        updateHUD();
        moveSnail();
    };

    function nextItem() {
        itemIndex++;
        if (itemIndex >= occupations.length) {
            score += 50; // Level Bonus
            transitionToStage2();
        } else {
            document.getElementById('s1-img').src = occupations[itemIndex].image;
        }
    }

    function transitionToStage2() {
        itemIndex = 0;
        document.getElementById('stage1').classList.remove('active');
        document.getElementById('stage2').classList.add('active');
        loadStage2();
    }

    function loadStage2() {
        const data = occupations[itemIndex];
        document.getElementById('s2-img').src = data.image;
        document.getElementById('s2-text').innerText = data.sentence;
    }

    // Initial Load
    updateHUD();

</script>

</body>
</html>
